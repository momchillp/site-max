<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dystopian Drop Access</title>

<style>
@font-face {
    font-family: "Jane Austin";
    src: url("JaneAust.ttf") format("truetype");
}

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #000;
    overflow: hidden;
    height: 100vh;
    color: white;
    font-family: Arial, sans-serif;
}

/* =========================
   ENTRY SCREEN
========================= */
#entry-screen {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: black;
    z-index: 10;
}

/* EMAIL = Jane Austin */
input {
    font-family: "Jane Austin", serif;

    padding: 14px 16px;
    width: 280px;

    border: 1px solid #222;
    background: transparent;
    color: white;

    text-align: center;
    letter-spacing: 1px;
    outline: none;

    transition: transform 0.15s ease, border-color 0.15s ease;
}

/* BUTTON = Times New Roman */
button {
    font-family: "Times New Roman", Times, serif;

    margin-top: 15px;
    padding: 12px 26px;

    background: white;
    color: black;

    border: none;
    cursor: pointer;

    letter-spacing: 2px;
    font-size: 16px;

    transition: opacity 0.2s ease;
}

button:hover {
    opacity: 0.7;
}

/* INVALID EMAIL SHAKE */
.shake {
    animation: shake 0.25s linear;
    border-color: #ff3b3b;
}

@keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    50% { transform: translateX(6px); }
    75% { transform: translateX(-4px); }
    100% { transform: translateX(0); }
}

/* =========================
   VIDEO SCREEN
========================= */
#video-screen {
    position: absolute;
    width: 100%;
    height: 100%;
    display: none;

    opacity: 0;
    transition: opacity 1.6s ease;

    background: black;
}

#video-screen.show {
    opacity: 1;
}

/* VIDEO */
video {
    width: 100%;
    height: 100%;

    object-fit: contain;
    background: black;

    transform: translateY(-5%);
}

/* =========================
   TEXT AFTER VIDEO
========================= */
#overlay-text {
    position: absolute;

    width: 100%;
    text-align: center;

    top: 56%;
    transform: translateY(-50%);

    font-family: "Times New Roman", Times, serif;

    font-size: 18px;
    letter-spacing: 1px;

    opacity: 0;
    transition: opacity 1s ease;

    padding: 0 20px;

    white-space: pre-line;
    line-height: 1.5;
}

/* ONLY THANK YOU = Jane Austin */
.thank-you {
    font-family: "Jane Austin", serif;
    font-size: 28px;
}

/* TYPE CURSOR */
.cursor {
    display: inline-block;
    animation: blink 0.8s infinite;
}

@keyframes blink {
    50% {
        opacity: 0;
    }
}
</style>
</head>

<body>

<!-- ENTRY -->
<div id="entry-screen">
    <input type="email" id="email" placeholder="Enter your email" />
    <button onclick="startExperience()">SUBMIT</button>
</div>

<!-- VIDEO -->
<div id="video-screen">
    <video id="introVideo" playsinline>
        <source src="intro.mov" type="video/mp4">
    </video>

    <div id="overlay-text"></div>
</div>

<script>

const entry = document.getElementById("entry-screen");
const videoScreen = document.getElementById("video-screen");
const video = document.getElementById("introVideo");
const overlay = document.getElementById("overlay-text");
const input = document.getElementById("email");

/* =========================
   START EXPERIENCE
========================= */
function startExperience() {

    const email = input.value;

    if (!email.includes("@")) {

        input.classList.add("shake");

        setTimeout(() => {
            input.classList.remove("shake");
        }, 250);

        return;
    }

    entry.style.display = "none";
    videoScreen.style.display = "block";

    setTimeout(() => {
        videoScreen.classList.add("show");
    }, 50);

    video.play();

    video.onended = () => {

        video.pause();

        showTypewriter(
`<span class="thank-you">Thank you!</span>

You are now standing against the graveyard we live in.
You will be notified when we drop`
        );
    };
}

/* =========================
   TYPEWRITER + MISFIRE
========================= */
function showTypewriter(htmlText) {

    overlay.style.opacity = 1;

    let i = 0;

    function type() {

        if (i < htmlText.length) {

            const char = htmlText[i];

            const misfire = Math.random() < 0.10;

            if (
                misfire &&
                char !== " " &&
                char !== "<" &&
                char !== ">"
            ) {

                const wrongChar =
                    String.fromCharCode(char.charCodeAt(0) + 1);

                overlay.innerHTML =
                    htmlText.substring(0, i) +
                    wrongChar +
                    '<span class="cursor">|</span>';

                setTimeout(() => {

                    overlay.innerHTML =
                        htmlText.substring(0, i + 1) +
                        '<span class="cursor">|</span>';

                }, 70);

                setTimeout(type, 120);

            } else {

                overlay.innerHTML =
                    htmlText.substring(0, i + 1) +
                    '<span class="cursor">|</span>';

                setTimeout(type, 35);
            }

            i++;

        } else {

            overlay.innerHTML = htmlText;
        }
    }

    type();
}

</script>

</body>
</html>
